app-id: {{FLATPAK_ID}}
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: {{APP_BIN}}
finish-args:
  # Native permissions for Slint and GTK to work
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri # Hardware/GPU acceleration
modules:
  - name: myslintapp-module
    buildsystem: simple
    build-commands:
      # Takes the Nuitka binary and place it in the Flatpak folder.
      - install -D dist/{{APP_BIN}} /app/bin/{{APP_BIN}}
    sources:
      - type: dir
        path: .
