name: Multi-Platform Build Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  APP_NAME: MySlintApp
  APP_VERSION: 1.0.0
  COMPANY_NAME: "Vinicius Costa"

jobs:
  test_build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            arch: x86
          - os: windows-arm64
            arch: arm64
          # macOS
          - os: macos-13
            arch: x86
          - os: macos-latest
            arch: aarch64
          # Linux
          - os: ubuntu-latest
            arch: x86
          - os: ubuntu-24.04-arm
            arch: arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install nuitka slint zstandard
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        shell: bash

      - name: Build with Nuitka
        run: |
          python -m nuitka --assume-yes-for-downloads --standalone --onefile --include-data-dir=src/ui=ui --output-dir=build --output-filename="test-${{ matrix.arch }}" src/main.py
        shell: bash
